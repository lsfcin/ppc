<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PPC — Grade LC/UFRPE</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.6/Sortable.min.js"></script>
  <script src="data.js"></script>
  <script src="constraints.js"></script>
  <script src="app.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.9/dist/cdn.min.js"></script>
</head>
<body x-data="ppc()" x-init="$nextTick(() => initSortable())"
  @keydown.ctrl.z.window.prevent="undo()"
  @keydown.ctrl.y.window.prevent="redo()"
  @keydown.ctrl.shift.z.window.prevent="redo()">
<div class="wrap">

  <!-- ── Header ───────────────────────────────────────────────────────────── -->
  <div class="header">
    <div>
      <input class="editable-title" type="text" x-model="title" spellcheck="false">
      <input class="editable-subtitle" type="text" x-model="subtitle" spellcheck="false">
    </div>
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:8px">
      <div class="badge" x-text="`CH Total: ${totalHours()}h`"></div>
      <div class="toolbar">
        <button class="tool-btn" @click="undo()" :disabled="_history.length === 0">↩ Desfazer</button>
        <button class="tool-btn" @click="redo()" :disabled="_future.length === 0">↪ Refazer</button>
        <label class="tool-btn" style="cursor:pointer">
          ⬆ Importar JSON
          <input class="import-file" type="file" accept=".json" @change="importJSON($event)">
        </label>
        <button class="tool-btn" @click="exportJSON()">⬇ Exportar JSON</button>
        <button class="tool-btn" @click="printPDF()">⎙ Gerar PDF</button>
      </div>
    </div>
  </div>

  <!-- ── Main area ───────────────────────────────────────────────────────── -->
  <div class="main-area">

    <!-- Constraint sidebar (left) -->
    <div class="constraint-bar" :class="{open: constraintOpen}">
      <div class="constraint-collapsed" @click="constraintOpen = true">
        <span class="constraint-rotated-label">Verificação de Restrições</span>
        <div class="constraint-mini-badges">
          <span class="mini-badge mini-ok"   x-text="constraints().filter(c=>c.ok).length"></span>
          <span class="mini-badge mini-fail"
            x-show="constraints().filter(c=>!c.ok).length > 0"
            x-text="constraints().filter(c=>!c.ok).length"></span>
        </div>
      </div>
      <div class="constraint-expanded">
        <div class="constraint-bar-head" @click="constraintOpen = false">
          <div style="display:flex;align-items:center;gap:10px">
            <span style="font-weight:800;font-size:14px">Verificação de Restrições</span>
            <span class="constraint-summary" x-html="constraintSummary()"></span>
          </div>
          <span style="font-size:12px;color:var(--muted)">✕</span>
        </div>
        <div class="constraint-rows">
          <template x-for="c in constraints()" :key="c.id">
            <div class="constraint-row">
              <div class="constraint-status" :class="c.ok ? 'ok' : 'fail'" x-text="c.ok ? '✓' : '✗'"></div>
              <div>
                <div class="constraint-label" x-text="c.label"></div>
                <div class="constraint-value" x-text="c.value"></div>
              </div>
              <button class="adv-toggle" @click="c.detailOpen = !c.detailOpen"
                x-text="c.detailOpen ? '▲' : 'ver lei'"></button>
              <div class="constraint-detail" x-show="c.detailOpen" x-text="c.detail"></div>
            </div>
          </template>
        </div>
      </div>
    </div>

    <!-- Content area -->
    <div class="content-area">

      <!-- ── Grid ─────────────────────────────────────────────────────────── -->
      <div class="card grid-wrap" id="grid-wrap">
        <div class="grid">
          <template x-for="p in 9" :key="p">
            <section class="period">
              <div class="period-head">
                <div class="title" x-text="ordinals[p-1] + ' Período'"></div>
                <div class="meta"  x-html="periodMeta(p)"></div>
              </div>
              <div class="cards" :id="`period-${p}`">
                <template x-for="d in disciplinesIn(p)" :key="d.id">
                  <div class="course" :class="d.color" :data-id="d.id" @click="openModal(d.id)">
                    <div class="hrs"  x-text="d.hours + 'h - ' + (d.eadPercent > 0 ? d.eadPercent + '% ead' : 'presencial')"></div>
                    <div class="name" x-text="d.name"></div>
                    <div class="meta" x-show="cardMeta(d)" x-text="cardMeta(d)"></div>
                    <div class="tag"  x-text="d.department + (d.isElective ? ' · Optativa' : '')"></div>
                  </div>
                </template>
              </div>
              <button class="add-btn" @click="addDiscipline(p)" title="Adicionar disciplina">＋</button>
            </section>
          </template>
        </div>
      </div>

      <!-- ── Summary footer ───────────────────────────────────────────────── -->
      <div class="footer">
        <div class="panel">
          <h2>Resumo da proposta</h2>
          <div class="summary-grid">
            <div class="stat"><div class="label">CH Disciplinas</div><div class="value" x-text="disciplineHours() + 'h'"></div></div>
            <div class="stat"><div class="label">Extensão (N. III)</div><div class="value" x-text="nucleusHours('III') + 'h'"></div></div>
            <div class="stat"><div class="label">Estágio (N. IV)</div><div class="value" x-text="nucleusHours('IV') + 'h'"></div></div>
            <div class="stat"><div class="label">CH Total</div><div class="value" x-text="totalHours() + 'h'"></div></div>
          </div>
          <div class="note" x-text="`Núcleo I (Formação Geral): ${nucleusHours('I')}h de 880h`"></div>
          <div class="note" x-text="`Núcleo II (Conhecimentos Específicos): ${nucleusHours('II')}h de 1600h`"></div>
          <div class="note">
            Atividades Autônomas:
            <input type="number" min="0" step="15" x-model.number="atividadesAutonomas"
              @focus="_pushHistory()"
              style="width:60px;margin:0 4px;border:1px solid #d1d5db;border-radius:6px;padding:2px 6px;font-size:12px;">
            h (mín. 120h)
          </div>
        </div>
        <div class="panel">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
            <h2 style="margin:0">Legenda</h2>
            <button class="tool-btn" style="font-size:11px;padding:4px 10px" @click="openCategoriesModal()">✎ Editar</button>
          </div>
          <div class="legend">
            <template x-for="cat in categories" :key="cat.value">
              <div class="legend-item">
                <span class="swatch" :class="cat.value"></span>
                <span x-text="`Núcleo ${cat.nucleus} — ${cat.label}`"></span>
              </div>
            </template>
          </div>
        </div>
      </div>

    </div><!-- .content-area -->

  </div><!-- .main-area -->

</div><!-- .wrap -->

<!-- ── Edit modal ───────────────────────────────────────────────────────────── -->
<dialog id="edit-modal" @click.self="closeModal()">
  <div class="modal-head">
    <h3>Editar disciplina</h3>
    <button class="modal-close" @click="closeModal()">✕</button>
  </div>
  <div class="modal-body" x-show="editing">
    <div class="field">
      <label>Nome</label>
      <input type="text" x-model="editing.name">
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <div class="field">
        <label>Departamento</label>
        <select x-model="editing.department">
          <option>DC</option><option>DED</option><option>DM</option>
          <option>DL</option><option>DLCH</option><option>Outro</option>
        </select>
      </div>
      <div class="field">
        <label>Período</label>
        <select x-model.number="editing.period">
          <template x-for="p in 9" :key="p">
            <option :value="p" x-text="ordinals[p-1]"></option>
          </template>
        </select>
      </div>
    </div>
    <div class="checks-row">
      <label class="check-item"><input type="checkbox" x-model="editing.isElective"> Optativa</label>
      <label class="check-item">EaD <input type="number" min="0" max="100" step="5" x-model.number="editing.eadPercent" style="width:52px;margin:0 4px;border:1px solid #d1d5db;border-radius:6px;padding:2px 6px;font-size:13px;text-align:center"> %</label>
    </div>
    <div class="field">
      <label>Carga horária (múltiplo de 15h)</label>
      <div class="hours-row">
        <div class="hours-cell">
          <label>Teoria</label>
          <input type="number" min="0" step="15" x-model.number="editing.teoria.hours" @change="fixColor()">
          <select x-show="editing.teoria.hours > 0" x-model="editing.teoria.nucleus" class="nucleus-inline" @change="fixColor()">
            <option value="I">Núcleo I</option>
            <option value="II">Núcleo II</option>
            <option value="IV">Núcleo IV</option>
          </select>
        </div>
        <div class="hours-cell">
          <label>Prática</label>
          <input type="number" min="0" step="15" x-model.number="editing.pratica.hours" @change="fixColor()">
          <select x-show="editing.pratica.hours > 0" x-model="editing.pratica.nucleus" class="nucleus-inline" @change="fixColor()">
            <option value="I">Núcleo I</option>
            <option value="II">Núcleo II</option>
            <option value="IV">Núcleo IV</option>
          </select>
        </div>
        <div class="hours-cell">
          <label>Extensão</label>
          <input type="number" min="0" step="15" x-model.number="editing.extensao.hours" @change="fixColor()">
          <div x-show="editing.extensao.hours > 0" class="nucleus-fixed">Núcleo III (fixo)</div>
        </div>
      </div>
      <div style="margin-top:6px;font-size:12px;color:var(--muted)">
        Total: <strong x-text="editing.teoria.hours + editing.pratica.hours + editing.extensao.hours + 'h'"></strong>
        <span class="hours-warning" x-show="hoursInvalid()" x-text="' — ' + hoursWarning()"></span>
      </div>
    </div>
    <div class="field">
      <label>Categoria / Cor</label>
      <select x-model="editing.color">
        <template x-for="cat in availableCategories()" :key="cat.value">
          <option :value="cat.value" x-text="cat.label"></option>
        </template>
      </select>
    </div>
    <div class="field">
      <label>Pré-requisitos</label>
      <div class="prereq-list">
        <template x-for="d in otherDisciplines()" :key="d.id">
          <label class="prereq-item">
            <input type="checkbox"
              :checked="editing.prerequisites.includes(d.id)"
              @change="togglePrereq(d.id)">
            <span x-text="`${ordinals[d.period-1]} — ${d.name}`"></span>
          </label>
        </template>
      </div>
    </div>
  </div>
  <div class="modal-footer">
    <button class="btn btn-danger"  @click="deleteEditing()">Excluir</button>
    <button class="btn btn-cancel"  @click="closeModal()">Cancelar</button>
    <button class="btn btn-primary" @click="saveEditing()" :disabled="hoursInvalid()">Salvar</button>
  </div>
</dialog>

<!-- ── Categories modal ─────────────────────────────────────────────────────── -->
<dialog id="categories-modal" @click.self="closeCategoriesModal()">
  <div class="modal-head">
    <h3>Categorias / Cores</h3>
    <button class="modal-close" @click="closeCategoriesModal()">✕</button>
  </div>
  <div class="modal-body" x-show="_stagingCategories">
    <template x-for="(cat, idx) in _stagingCategories" :key="idx">
      <div class="cat-row">
        <div class="cat-colors">
          <template x-for="c in ['salmon','blue','cyan','green','gray','purple','orange','yellow']" :key="c">
            <button class="cat-color-btn" :class="c"
              :style="cat.value === c ? 'outline:2px solid #374151;outline-offset:2px' : ''"
              @click="cat.value = c" :title="c"></button>
          </template>
        </div>
        <input type="text" class="cat-label-input" x-model="cat.label" placeholder="Nome">
        <select class="cat-nucleus-select" x-model="cat.nucleus">
          <option value="I">Núcleo I</option>
          <option value="II">Núcleo II</option>
          <option value="III">Núcleo III</option>
          <option value="IV">Núcleo IV</option>
        </select>
        <button class="cat-del-btn" @click="deleteStagingCategory(idx)"
          :disabled="inUseCount(cat.value) > 0"
          :title="inUseCount(cat.value) > 0 ? `Em uso por ${inUseCount(cat.value)} disciplina(s)` : 'Excluir'">✕</button>
      </div>
    </template>
    <button class="btn btn-cancel" style="width:100%;margin-top:12px" @click="addStagingCategory()">＋ Adicionar categoria</button>
  </div>
  <div class="modal-footer">
    <button class="btn btn-cancel" @click="closeCategoriesModal()">Cancelar</button>
    <button class="btn btn-primary" @click="saveCategoriesModal()">Salvar</button>
  </div>
</dialog>

</body>
</html>
