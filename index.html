<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PPC — Grade LC/UFRPE</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="modal.css">
  <link rel="stylesheet" href="constraints.css">
  <script>window.MODALS = {}</script>
  <script src="partials/constraint-panel.js"></script>
  <script src="partials/edit-modal.js"></script>
  <script src="partials/categories-modal.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.6/Sortable.min.js"></script>
  <script src="transversal-themes.js"></script>
  <script src="constraints.js"></script>
  <script src="history.js"></script>
  <script src="sortable.js"></script>
  <script src="disciplines.js"></script>
  <script src="categories.js"></script>
  <script src="app.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.9/dist/cdn.min.js"></script>
</head>
<body x-data="ppc()"
  @keydown.ctrl.z.window.prevent="undo()"
  @keydown.ctrl.y.window.prevent="redo()"
  @keydown.ctrl.shift.z.window.prevent="redo()">
<div class="wrap">

  <div class="header">
    <div style="flex:1;min-width:0">
      <input class="editable-title" type="text" x-model="title" spellcheck="false">
      <input class="editable-subtitle" type="text" x-model="subtitle" spellcheck="false">
    </div>
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:8px">
      <div class="toolbar">
        <button class="tool-btn" @click="undo()" :disabled="_history.length === 0">↩ Desfazer</button>
        <button class="tool-btn" @click="redo()" :disabled="_future.length === 0">↪ Refazer</button>
        <button class="tool-btn" @click="addPeriod()" :disabled="numPeriods >= 15">＋ Período</button>
        <button class="tool-btn" @click="removeLastPeriod()"
          :disabled="numPeriods <= 1 || disciplines.some(d => d.period === numPeriods)"
          :title="disciplines.some(d => d.period === numPeriods) ? 'Mova as disciplinas do último período antes de remover' : ''">− Período</button>
        <label class="tool-btn" style="cursor:pointer">
          ⬆ Importar JSON
          <input class="import-file" type="file" accept=".json" @change="importJSON($event)">
        </label>
        <button class="tool-btn" @click="exportJSON()">⬇ Exportar JSON</button>
        <button class="tool-btn" @click="printPDF()">⎙ Gerar PDF</button>
      </div>
    </div>
  </div>

  <div class="main-area">
    <div id="constraint-mount" style="display:contents"></div>

    <div class="content-area">
      <div class="card grid-wrap" id="grid-wrap">
        <div class="empty-banner" x-show="disciplines.length === 0">
          Grade vazia —
          <label style="cursor:pointer;color:#2563eb;text-decoration:underline">
            importe um arquivo JSON
            <input type="file" accept=".json" @change="importJSON($event)" style="display:none">
          </label>
          ou adicione disciplinas com os botões ＋ nos períodos abaixo.
        </div>
        <div class="grid" :style="`grid-template-columns: repeat(${numPeriods}, 1fr)`">
          <template x-for="p in numPeriods" :key="p">
            <section class="period">
              <div class="period-head">
                <div class="title" x-text="ordinals[p-1] + ' Período'"></div>
                <div class="meta"  x-html="periodMeta(p)"></div>
              </div>
              <div class="cards" :id="`period-${p}`">
                <template x-for="d in disciplinesIn(p)" :key="d.id">
                  <div class="course" :class="d.color" :data-id="d.id" @click="openModal(d.id)">
                    <div class="hrs"       x-text="hrsChip(d)"></div>
                    <div class="hrs-split" x-show="hrsBreakdown(d)" x-text="hrsBreakdown(d)"></div>
                    <div class="name" x-text="d.name"></div>
                    <div class="meta" x-show="cardMeta(d)" x-text="cardMeta(d)"></div>
                    <div class="tag"  x-text="d.department"></div>
                  </div>
                </template>
              </div>
              <button class="add-btn" @click="addDiscipline(p)" title="Adicionar disciplina">＋</button>
            </section>
          </template>
        </div>
      </div>

      <div class="footer">
        <div class="panel">
          <h2>Resumo da proposta</h2>
          <div class="summary-grid">
            <div class="stat"><div class="label">CH Disciplinas</div><div class="value" x-text="disciplineHours() + 'h'"></div></div>
            <div class="stat"><div class="label">Extensão (N. III)</div><div class="value" x-text="nucleusHours('III') + 'h'"></div></div>
            <div class="stat"><div class="label">Estágio (N. IV)</div><div class="value" x-text="nucleusHours('IV') + 'h'"></div></div>
            <div class="stat"><div class="label">CH Total</div><div class="value" x-text="totalHours() + 'h'"></div></div>
          </div>
          <div class="note" x-text="`Núcleo I (Formação Geral): ${nucleusHours('I')}h de 880h`"></div>
          <div class="note" x-text="`Núcleo II (Conhecimentos Específicos): ${nucleusHours('II')}h de 1600h`"></div>
          <div class="note">
            Atividades Autônomas:
            <input type="number" min="0" step="15" x-model.number="atividadesAutonomas"
              @focus="_pushHistory()"
              style="width:60px;margin:0 4px;border:1px solid #d1d5db;border-radius:6px;padding:2px 6px;font-size:12px;">
            h (mín. 120h)
          </div>
        </div>
        <div class="panel">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
            <h2 style="margin:0">Legenda</h2>
            <button class="tool-btn" style="font-size:11px;padding:4px 10px" @click="openCategoriesModal()">✎ Editar</button>
          </div>
          <div class="legend">
            <div class="legend-col">
              <template x-for="cat in categories.slice(0, Math.ceil(categories.length/2))" :key="cat.id">
                <div class="legend-item">
                  <span class="swatch" :class="cat.value"></span>
                  <span x-text="`Núcleo ${cat.nucleus} — ${cat.label}`"></span>
                </div>
              </template>
            </div>
            <div class="legend-col">
              <template x-for="cat in categories.slice(Math.ceil(categories.length/2))" :key="cat.id">
                <div class="legend-item">
                  <span class="swatch" :class="cat.value"></span>
                  <span x-text="`Núcleo ${cat.nucleus} — ${cat.label}`"></span>
                </div>
              </template>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

</div>
<div id="modal-mount"></div>
<script>
  document.getElementById('modal-mount').innerHTML = MODALS.edit + MODALS.cats
  document.getElementById('constraint-mount').innerHTML = MODALS.constraint
</script>
</body>
</html>
